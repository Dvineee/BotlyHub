
<!DOCTYPE html>
<html lang="tr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BotlyHub V3</title>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        background-color: #020617;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        -webkit-tap-highlight-color: transparent;
      }
      #loader {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #fcf4ff;
        color: #020617;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <svg width="120" height="120" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(26 150 150)">
          <polygon points="150,85 225,195 75,195" fill="#229ED9" opacity="0.9"/>
          <line x1="150" y1="85" x2="225" y2="195" stroke="#FF8A3D" stroke-width="38" stroke-linecap="round" stroke-opacity="0.85"/>
          <line x1="75" y1="195" x2="150" y2="85" stroke="#22C55E" stroke-width="38" stroke-linecap="round" stroke-opacity="0.85"/>
          <line x1="225" y1="195" x2="75" y2="195" stroke="#229ED9" stroke-width="38" stroke-linecap="round" stroke-opacity="0.85"/>
        </g>
      </svg>
      <div style="font-size: 14px; opacity: 0.7; font-family: 'Inter', sans-serif; margin-top: 20px; font-weight: 600; letter-spacing: 0.05em;">BotlyHub V3 Yükleniyor...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
